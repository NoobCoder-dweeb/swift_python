services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: swift
      POSTGRES_USER: swift
      POSTGRES_PASSWORD: swift
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swift -d swift"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://swift:swift@postgres:5432/swift
      SWIFT_STORAGE_BACKEND: postgres
      SWIFT_CREWAI_ENABLED: "0"
      SWIFT_SEED_DEMO_DATA: "1"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:
